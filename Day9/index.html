<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Padding-Margin-Border</title>
    <style>
        .box{
            padding: 20px;
            margin: 20px;
            border: 2px solid blueviolet;
            width: 150px;
            font-weight: 900;

        }
        .box1{
            /* border: 2px solid orange; */
            padding: 20px;
            box-sizing: border-box;
            text-align: center;
        }
    </style>
</head>
<body>
    
    <div class="box">
        This is a Box
    </div>

    <span class="box1">
        <u>
            This is second Box
        </u>
    </span>
    
</body>
</html>
