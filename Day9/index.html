<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Box-Model(Padding-Margin-Border)</title>
    <style>
        .box{
            padding: 20px;
            margin: 20px;
            border: 2px solid blueviolet;
            color: blue;
            /* width: 150px; */
            /* font-weight: 900; */
            box-sizing: border-box;
            background-color:yellow;

        }
        .box1{
            /* border: 2px solid orange; */
            padding: 20px;
            color:whitesmoke;
            background-color: aqua;
            text-align: center;
            /* width: 800px; */
        }
    </style>
</head>
<body>
    
    <div class="box">
        This is a Box
    </div>

    <span class="box1">
        <u>
            This is second Box
        </u>
    </span>
    
</body>
</html>
