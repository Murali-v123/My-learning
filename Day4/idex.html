<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Semantics WebPage</title>
</head>
<body>
    <header>
        <h1>This Is Semantic WebPage</h1>
    </header>
    <main>
        <h2>Video Section</h2>
        <span>
            <video src="video1.mp4" controls loop>Video1</video>
        </span>
        <span>
            <video src="video2.mp4" controls autoplay>Video2</video>
        </span>
        <span>
            <video src="video3.mp4" controls muted>Video3</video>
        </span>
        <span>
            <video src="video4.mp4" controls >Video4</video>
        </span>
        <span>
            <video src="video5.mp4" controls>Video5</video>
        </span>
        <span>
            <video src="video6.mp4" controls>Video6</video>
        </span>

        <h2>Audio Section</h2>

        <span>
            <audio src="audio1.mp3" controls preload="auto">Audio1</audio>
        </span>
        <span>
            <audio src="./Darling bgm.mp3" controls preload="metadata">Darling bgm</audio>
        </span>
        <span>
            <audio src="audio3.mp3" controls preload="none">Audio3</audio>
        </span>
        <span>
            <audio src="audio4.mp3" controls autoplay>Audio4</audio>
        </span>
        <span>
            <audio src="audio5.mp3" controls loop>Audio5</audio>
        </span>
        <span>
            <audio src="audio6.mp3" controls muted>Audio6</audio>
        </span>
    </main>


    <footer>
        This is the end of Semantic page
    </footer>
</body>
</html>
