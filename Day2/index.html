<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms</title>
</head>
<body>
    <form action="">
        <fieldset style="border: 2px solid rgb(7, 6, 8);">
        <label for="name">Enter Your Name</label>
        <input type="name" name="name" placeholder="Enter Your Name"><br>
        <label for="ag">age:</label>
        <input type="number" name="ag" id="ag" class="ag" placeholder="enter your age"><br>
        <label for="class">Std:</label>
        <input type="number" name="class" placeholder="select Your Class">
        </fieldset>

        <div>
        </div>

        <div>
        <label>Gender</label>
        <br>
        <label for="gender">male</label>
        <input type="radio" name="gender" value="male" class="gen">
        <label for="gender">male</label>
        <input type="radio" name="gender" value="female" class="gen">
        <label for="gender">others</label>
        <input type="radio" name="gender" value="others" class="gen">
        </div>

        <label>Skills:</label><br>
        <label for="sk">Python</label>
        <input type="checkbox" name="sk" class="Skills"><br>
        <label for="sk">Java</label>
        <input type="checkbox" name="sk" class="Skills"><br>
        <label for="sk">c++</label>
        <input type="checkbox" name="sk" class="Skills"><br>
        <label for="sk">Web</label>
        <input type="checkbox" name="sk" class="Skills"><br>

        <label for="dob">DOB</label><br>
        <input type="date" name="date" id="date" class="dob">

        <br>
        <label >Time</label>
        <input type="time" id="time"  name="time" class="time"><br>

        <label for="comment">Enter the comments</label><br>
        <textarea name="comment" id="comment" rows="5" cols="19" Comments"></textarea><br>

        <input type="submit" id="submit" class="submit">
        <input type="reset" id="submit" class="submit">

    </form>
</body>
</html>
